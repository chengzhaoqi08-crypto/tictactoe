<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Realtime Tic-Tac-Toe</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@microsoft/signalr@8/dist/browser/signalr.min.js"></script>
</head>
<body>
  <main class="card">
    <h1>Tic-Tac-Toe <span class="live">● live</span></h1>

    <section id="lobby" class="lobby">
      <input id="roomInput" placeholder="Room code (e.g. ABCD)" maxlength="8" autocomplete="off" />
      <button id="joinBtn">Join / Create</button>
      <p class="hint">Share the code with a friend — or open this page in two tabs to test.</p>
    </section>

    <section id="game" class="hidden">
      <p class="status" id="status">Connecting…</p>
      <p class="you">You are <b id="mark">?</b> &middot; Room <b id="roomLabel"></b></p>
      <div class="board" id="board"><!-- cells injected by app.js --></div>
      <button id="restartBtn" class="restart">Restart round</button>
    </section>

    <footer>ASP.NET Core &middot; SignalR &middot; vanilla JS</footer>
  </main>

  <script src="app.js"></script>
</body>
</html>
